name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Check TypeScript contracts
        run: npm run typecheck

      - name: Run contract tests
        run: npm run test:coverage

      - name: Build production application
        run: npm run build

  database:
    name: Database gates
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      SUPABASE_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require database tests
        run: npm run db:test:present

      - name: Start local Supabase
        run: npm run db:start:ci

      - name: Rebuild database twice
        run: |
          npm run db:reset
          npm run db:reset

      - name: Lint database
        run: npm run db:lint

      - name: Run database tests
        run: npm run db:test

      - name: Check generated database types
        run: npm run db:types:check

      - name: Stop local Supabase
        if: always()
        continue-on-error: true
        run: npm run db:stop -- --no-backup
