<!doctype html>
<html lang="en">
  <body style="font-family: sans-serif; color: #201f1b; line-height: 1.6">
    <h2>Reset your Interview Memory password</h2>
    <p>Şifreni yenilemek için aşağıdaki tek kullanımlık bağlantıyı aç.</p>
    <p>Open the one-time link below to reset your password.</p>
    <p>
      <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&amp;type=recovery">
        Reset password · Şifreyi yenile
      </a>
    </p>
    <p>If you did not request a password reset, you can ignore this email.</p>
  </body>
</html>
